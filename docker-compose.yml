services:
  postgres:
    image: postgres:16-alpine
    container_name: memento-mori-postgres
    environment:
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: memento
      POSTGRES_DB: memento_mori
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento -d memento_mori"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
