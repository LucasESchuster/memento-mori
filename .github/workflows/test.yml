name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_DATABASE_URL: postgresql://memento:memento@localhost:5432/memento_mori_test
  DATABASE_URL: postgresql://memento:memento@localhost:5432/memento_mori_test
  RESEND_API_KEY: test_resend_key
  EMAIL_FROM: tests@example.com
  APP_URL: http://localhost:3000

jobs:
  vitest:
    name: vitest (unit + integration + dom) + coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memento
          POSTGRES_PASSWORD: memento
          POSTGRES_DB: memento_mori_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memento"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to test DB
        run: npx prisma migrate deploy

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

  e2e:
    name: playwright (full flow)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memento
          POSTGRES_PASSWORD: memento
          POSTGRES_DB: memento_mori_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memento"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to test DB
        run: npx prisma migrate deploy

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
